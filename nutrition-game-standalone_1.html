<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Nutrition & Metabolism Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f8fafb;color:#1e293b;overflow-x:hidden}
.screen{min-height:100vh;display:none}.screen.active{display:block}
.home-bg{background:linear-gradient(135deg,#065A60,#0F766E);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.hdr{background:#065A60;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.hdr button{background:none;border:none;color:#fff;font-size:14px;cursor:pointer;font-weight:600}
.hdr span{color:#14B8A6;font-weight:700;font-size:14px}
.prog{height:4px;background:#e5e7eb}.prog-fill{height:100%;background:#14B8A6;transition:width 0.3s}
.container{padding:16px 20px 32px;max-width:440px;margin:0 auto}
.card-btn{width:100%;max-width:340px;padding:16px 20px;margin-bottom:12px;background:#fff;border:none;border-radius:14px;cursor:pointer;text-align:left;box-shadow:0 4px 16px rgba(0,0,0,.12);display:flex;align-items:center;gap:14px}
.card-btn:hover{transform:scale(1.01)}
.card-btn .em{font-size:32px}.card-btn .ti{font-size:16px;font-weight:700;color:#065A60}.card-btn .de{font-size:12px;color:#888;margin-top:1px}
.tag{display:inline-block;background:#0F766E20;color:#0F766E;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.q-card{background:#fff;border-radius:18px;padding:24px 20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);min-height:80px;display:flex;align-items:center;justify-content:center}
.q-card p{font-size:18px;font-weight:600;line-height:1.45;text-align:center;width:100%}
.btn{padding:14px 24px;border:none;border-radius:14px;font-weight:700;font-size:15px;cursor:pointer;color:#fff;width:100%}
.btn-teal{background:#0F766E}.btn-red{background:#DC2626}.btn-green{background:#16A34A}.btn-amber{background:#D97706}.btn-gray{background:#f1f1f1;color:#333}
.btn-row{display:flex;gap:12px}.btn-row .btn{flex:1}
.result-box{border-radius:14px;padding:14px 18px;margin-bottom:12px;border:2px solid}
.result-ok{background:#f0fdf4;border-color:#16A34A}.result-ok .rt{color:#16A34A}
.result-no{background:#fef2f2;border-color:#DC2626}.result-no .rt{color:#DC2626}
.rt{font-weight:800;font-size:16px;margin-bottom:6px}
.result-box p{font-size:13px;color:#444;line-height:1.55}
.slide-ref{font-size:11px;color:#0F766E;font-style:italic;margin-top:8px}
.end-card{background:#fff;border-radius:24px;padding:32px;max-width:360px;width:100%;text-align:center}
.end-emoji{font-size:56px}.end-title{font-size:22px;font-weight:800;color:#065A60;margin:8px 0 0}
.end-score{font-size:40px;font-weight:800;margin:8px 0}
/* Label */
.label-box{background:#fff;border:3px solid #1a1a1a;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:12px}
.label-title{font-weight:900;font-size:16px;border-bottom:8px solid #1a1a1a;padding-bottom:4px;margin-bottom:6px}
.label-cal{border-top:3px solid #1a1a1a;padding-top:4px;display:flex;justify-content:space-between;font-weight:800;font-size:18px;margin-bottom:4px}
.label-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #eee;font-size:12px}
.label-row.bold{font-weight:700}.label-row.warn{color:#DC2626}
.label-q{background:#7C3AED10;border-radius:12px;padding:12px 16px;margin-bottom:14px;border-left:4px solid #7C3AED}
.label-q p{font-size:15px;font-weight:700;margin:0}
.opt-btn{display:block;width:100%;padding:12px 16px;margin-bottom:8px;background:#fff;border:2px solid #e5e7eb;border-radius:12px;font-size:14px;cursor:pointer;text-align:left;font-weight:500}
.opt-btn.correct{background:#f0fdf4;border-color:#16A34A;color:#16A34A;font-weight:700}
.opt-btn.wrong{background:#fef2f2;border-color:#DC2626;color:#DC2626;font-weight:700}
.opt-btn.dim{cursor:default}
/* Meal */
.food-cat h3{font-size:13px;font-weight:700;margin:0 0 6px;display:flex;align-items:center;gap:5px}
.food-btn{padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:2px solid #e5e7eb;background:#fff;font-weight:500;margin:0 4px 6px 0;display:inline-block}
.food-btn.on{color:#fff;font-weight:700}
.meal-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:12px 20px;box-shadow:0 -4px 16px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;gap:14px}
.analysis-card{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.macro-bar{display:flex;height:22px;border-radius:11px;overflow:hidden;margin-bottom:10px}
.checklist-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.steps{margin:0;padding-left:18px;font-size:12px;color:#444;line-height:1.7}
/* Leaderboard */
.lb-entry{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;margin-bottom:8px;border:1px solid #e5e7eb}
.lb-rank{font-size:20px;font-weight:800;width:30px;text-align:center}
.lb-name{font-weight:700;font-size:15px}.lb-game{font-size:12px;color:#94a3b8}
.lb-pct{font-weight:800;font-size:18px}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:99}
.modal{background:#fff;border-radius:20px;padding:28px;max-width:320px;width:90%;text-align:center}
.modal input{width:100%;padding:10px 14px;border:2px solid #14B8A6;border-radius:10px;font-size:15px;margin-bottom:12px;outline:none}
@media(max-width:480px){.q-card p{font-size:16px}.container{padding:12px 16px 24px}}
</style>
</head>

function screens_home(){
const gm=[{id:"mythfact",em:"\ud83c\udfaf",t:"Myth vs. Fact",d:"30 questions \u2014 test what you know"},{id:"mealbuilder",em:"\ud83c\udf7d\ufe0f",t:"Build Your Plate",d:"Create a meal, see the science"},{id:"labeldetective",em:"\ud83d\udd0d",t:"Label Detective",d:"Decode real nutrition labels"},{id:"leaderboard",em:"\ud83c\udfc6",t:"Class Leaderboard",d:state.lb.length+" scores"}];
return `<div class="screen active home-bg">
<div style="text-align:center;margin-bottom:32px"><div style="font-size:44px;margin-bottom:6px">\ud83e\uddec\ud83c\udf4e\u26a1</div><h1 style="color:#fff;font-size:26px;font-weight:800;margin:0 0 4px">NUTRITION & METABOLISM</h1><p style="color:#14B8A6;font-size:14px;margin:0;font-style:italic">The Group Chat in Your Body</p></div>
${gm.map(g=>`<button class="card-btn" onclick="go('${g.id}')"><div class="em">${g.em}</div><div><div class="ti">${g.t}</div><div class="de">${g.d}</div></div></button>`).join("")}
</div>`;
}

function screens_mythfact(){
const m=state.myth,q=m.shuf[m.qi],tot=m.shuf.length;
if(m.qi>=tot){
const pct=Math.round(m.sc/tot*100),msg=pct>=90?["\ud83c\udfc6","Nutrition Scientist!"]:pct>=70?["\u2b50","Solid knowledge!"]:pct>=50?["\ud83d\udcaa","Getting there!"]:["\ud83d\udcda","Study up!"];
return `<div class="screen active home-bg" style="padding:24px"><div class="end-card"><div class="end-emoji">${msg[0]}</div><div class="end-title">${msg[1]}</div><div class="end-score" style="color:${pct>=70?"#16A34A":"#EA580C"}">${m.sc}/${tot}</div><p style="color:#888;font-size:13px">Best streak: ${m.best}</p><div class="btn-row" style="margin-top:20px;flex-wrap:wrap"><button class="btn btn-amber" style="flex:1" onclick="promptLb(${m.sc},'Myth vs. Fact',${tot})">\ud83c\udfc6 Leaderboard</button><button class="btn btn-teal" style="flex:1" onclick="go('mythfact')">Play Again</button><button class="btn btn-gray" style="flex:1" onclick="go('home')">Home</button></div></div></div>`}
const ok=m.sel===q.a,prog=(m.qi/tot*100);
return `<div class="screen active"><div class="hdr"><button onclick="go('home')">\u2190 Back</button><span>${m.sc}/${m.qi}${m.str>2?" \ud83d\udd25"+m.str:""}</span></div><div class="prog"><div class="prog-fill" style="width:${prog}%"></div></div><div class="container">
<div style="display:flex;justify-content:space-between;margin-bottom:10px"><span class="tag">${q.c}</span><span style="color:#aaa;font-size:12px">${m.qi+1}/${tot}</span></div>
<div class="q-card"><p>\u201c${q.s}\u201d</p></div>
${!m.ans?`<div class="btn-row"><button class="btn btn-red" onclick="mythAns('myth')">\ud83d\udeab MYTH</button><button class="btn btn-green" onclick="mythAns('fact')">\u2705 FACT</button></div>`:`<div><div class="result-box ${ok?"result-ok":"result-no"}"><div class="rt">${ok?"\u2705 Correct!":"\u274c It's a "+q.a.toUpperCase()}</div><p>${q.e}</p></div><button class="btn btn-teal" onclick="mythNext()">${m.qi<tot-1?"Next \u2192":"Results \u2192"}</button></div>`}
</div></div>`}

function screens_labeldetective(){
const l=state.label,q=l.shuf[l.qi],tot=l.shuf.length;
if(l.qi>=tot){
const pct=Math.round(l.sc/tot*100),msg=pct>=80?["\ud83d\udd75\ufe0f","Label Expert!"]:pct>=60?["\ud83d\udd0d","Good eye!"]:["\ud83d\udc40","Keep practicing!"];
return `<div class="screen active home-bg" style="padding:24px"><div class="end-card"><div class="end-emoji">${msg[0]}</div><div class="end-title">${msg[1]}</div><div class="end-score" style="color:${pct>=70?"#16A34A":"#EA580C"}">${l.sc}/${tot}</div><div class="btn-row" style="margin-top:20px;flex-wrap:wrap"><button class="btn btn-amber" style="flex:1" onclick="promptLb(${l.sc},'Label Detective',${tot})">\ud83c\udfc6 Leaderboard</button><button class="btn btn-teal" style="flex:1" onclick="go('labeldetective')">Play Again</button><button class="btn btn-gray" style="flex:1" onclick="go('home')">Home</button></div></div></div>`}
const L=q.label;
const rows=[{n:"Total Fat",v:L.tf+"g",b:1},{n:"  Sat. Fat",v:L.sf+"g"},{n:"Sodium",v:L.na+"mg",b:1},{n:"Total Carbs",v:L.tc+"g",b:1},{n:"  Fiber",v:L.fb+"g"},{n:"  Added Sugars",v:L.as+"g",w:L.as>10},{n:"Protein",v:L.pr+"g",b:1}];
return `<div class="screen active"><div class="hdr"><button onclick="go('home')">\u2190 Back</button><span>\ud83d\udd0d ${l.qi+1}/${tot}</span></div><div class="container">
<h3 style="font-size:16px;font-weight:800;color:#065A60;margin:0 0 12px">\ud83c\udff7\ufe0f ${q.product}</h3>
<div class="label-box"><div class="label-title">Nutrition Facts</div><div style="font-size:11px;color:#666;margin-bottom:4px">Serving size ${L.ss}</div><div class="label-cal"><span>Calories</span><span>${L.cal}</span></div>${rows.map(r=>`<div class="label-row${r.b?" bold":""}${r.w?" warn":""}"><span>${r.n}</span><span>${r.v}</span></div>`).join("")}</div>
<div class="label-q"><p>${q.q}</p></div>
${q.opts.map((o,i)=>{let cls="opt-btn";if(l.ans){if(i===q.correct)cls+=" correct";if(l.sel===i&&i!==q.correct)cls+=" wrong";cls+=" dim"}return`<button class="${cls}" onclick="labelAns(${i})">${l.ans&&i===q.correct?"\u2705 ":""}${l.ans&&l.sel===i&&i!==q.correct?"\u274c ":""}${o}</button>`}).join("")}
${l.ans?`<div style="background:#faf5ff;border:1px solid #7C3AED40;border-radius:12px;padding:12px 16px;margin-bottom:14px"><p style="font-size:13px;color:#444;line-height:1.55">${q.e}</p></div><button class="btn btn-teal" onclick="labelNext()">${l.qi<tot-1?"Next Label \u2192":"Results \u2192"}</button>`:""}
</div></div>`}

function screens_mealbuilder(){
const sel=state.meal.sel;
const tot=sel.reduce((a,f)=>({cal:a.cal+f.cal,cb:a.cb+f.cb,pr:a.pr+f.pr,ft:a.ft+f.ft}),{cal:0,cb:0,pr:0,ft:0});
if(state.meal.show){
const hP=sel.some(f=>f.c==="protein"),hC=sel.some(f=>f.c==="carbs"),hF=sel.some(f=>f.c==="fats"),hV=sel.some(f=>f.c==="veggies");
const hFb=sel.some(f=>fiberFoods.includes(f.n)),hSoda=sel.some(f=>f.n==="Soda"||f.n==="Energy Drink"),hW=sel.some(f=>f.n==="Water"||f.n==="Milk");
const bal=[hP,hC,hF].filter(Boolean).length;
let pred;
if(bal===3&&hFb&&!hSoda)pred={l:"Steady Energy",em:"\ud83d\udfe2",d:"Great combo! Protein + fat slow digestion, fiber steadies blood sugar. 3-4 hours of fuel.",cl:"#16A34A"};
else if(bal===3&&hSoda)pred={l:"Mixed Signals",em:"\ud83d\udfe1",d:"Good macros but soda adds a sugar spike. Swap for water or milk.",cl:"#D97706"};
else if(bal===3)pred={l:"Good Energy",em:"\ud83d\udfe1",d:"All three macros! Adding fiber would sustain it longer.",cl:"#D97706"};
else if(hC&&!hP&&!hF)pred={l:"Spike \u2192 Crash",em:"\ud83d\udd34",d:"Carbs alone = quick energy then crash. Add protein or fat.",cl:"#DC2626"};
else if(bal>=2)pred={l:"Pretty Good",em:"\ud83d\udfe1",d:"2 of 3 macros. Adding the missing one rounds it out.",cl:"#D97706"};
else pred={l:"Needs More",em:"\ud83d\udfe0",d:"Light on macros. Add a mix of carbs, protein, and fat.",cl:"#EA580C"};
const cP=tot.cal>0?Math.round(tot.cb*4/tot.cal*100):0,pP=tot.cal>0?Math.round(tot.pr*4/tot.cal*100):0,fP=tot.cal>0?Math.round(tot.ft*9/tot.cal*100):0;
const checks=[{l:"Protein",c:hP},{l:"Carbs",c:hC},{l:"Fats",c:hF},{l:"Fruits/veggies",c:hV},{l:"Fiber",c:hFb},{l:"Water/milk",c:hW}];
return `<div class="screen active"><div class="hdr"><button onclick="mealBack()">\u2190 Edit</button><span>Meal Analysis</span></div><div class="container">
<div class="analysis-card"><h3 style="margin:0 0 10px;font-size:15px;color:#065A60">Your Plate</h3><div style="display:flex;flex-wrap:wrap;gap:6px">${sel.map(f=>`<span style="background:#f0f9ff;padding:4px 10px;border-radius:16px;font-size:12px;font-weight:600">${f.e} ${f.n}</span>`).join("")}</div></div>
<div class="analysis-card" style="border-left:4px solid ${pred.cl}"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:24px">${pred.em}</span><h3 style="margin:0;font-size:17px;font-weight:800;color:${pred.cl}">${pred.l}</h3></div><p style="font-size:13px;color:#555;line-height:1.5">${pred.d}</p></div>
<div class="analysis-card"><div style="text-align:center;margin-bottom:12px"><span style="font-size:32px;font-weight:800;color:#065A60">${tot.cal}</span><span style="font-size:13px;color:#999;margin-left:4px">cal</span></div><div class="macro-bar">${cP>0?`<div style="width:${cP}%;background:#F97316"></div>`:""}${pP>0?`<div style="width:${pP}%;background:#0F766E"></div>`:""}${fP>0?`<div style="width:${fP}%;background:#D97706"></div>`:""}</div><div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:#F97316;font-weight:700">Carbs ${cP}%<br><span style="font-weight:400;color:#888">${tot.cb}g</span></span><span style="color:#0F766E;font-weight:700">Protein ${pP}%<br><span style="font-weight:400;color:#888">${tot.pr}g</span></span><span style="color:#D97706;font-weight:700">Fat ${fP}%<br><span style="font-weight:400;color:#888">${tot.ft}g</span></span></div></div>
<div class="analysis-card">${checks.map(c=>`<div class="checklist-row"><span style="font-size:16px">${c.c?"\u2705":"\u2b1c"}</span><span style="color:${c.c?"#333":"#aaa"};font-weight:${c.c?600:400}">${c.l}</span></div>`).join("")}</div>
<div style="background:#0F766E10;border-radius:18px;padding:16px;margin-bottom:16px;border:1px solid #0F766E30"><h3 style="margin:0 0 6px;font-size:14px;color:#065A60">\u26a1 After eating this:</h3><ol class="steps"><li>Digestion: carbs fastest, then protein, then fat</li><li>Glucose \u2192 bloodstream \u2192 insulin rises \u2192 cells fuel up</li><li>${hP&&hF?"Protein & fat slow emptying \u2192 steady energy":"Without protein/fat, glucose enters fast \u2192 crash"}</li><li>${hFb?"Fiber feeds gut bacteria + slows absorption":"Adding fiber = longer fullness"}</li><li>Glucose \u2192 pyruvate \u2192 acetyl-CoA \u2192 ATP via TCA & ETC</li>${hSoda?"<li style='color:#DC2626'>\u26a0\ufe0f Soda sugar hits fast with nothing to slow it</li>":""}</ol></div>
<div class="btn-row"><button class="btn btn-teal" onclick="mealBack()">Edit Meal</button><button class="btn btn-gray" onclick="mealReset()">Start Over</button></div>
</div></div>`}
return `<div class="screen active" style="padding-bottom:${sel.length>0?"90px":"20px"}"><div class="hdr"><button onclick="go('home')">\u2190 Back</button><span>\ud83c\udf7d\ufe0f Build Your Plate</span></div><div class="container"><p style="font-size:13px;color:#666;margin-bottom:14px">Pick foods, then analyze your meal's energy prediction, macro balance, and cellular pathway.</p>
${cats.map(ct=>`<div class="food-cat" style="margin-bottom:16px"><h3 style="color:${ct.cl}"><span>${ct.e}</span> ${ct.l}</h3><div>${foods.filter(f=>f.c===ct.k).map(f=>{const on=sel.find(x=>x.n===f.n);return`<button class="food-btn${on?" on":""}" style="${on?`background:${ct.cl};border-color:${ct.cl};color:#fff`:""}" onclick="mealToggle('${f.n.replace(/'/g,"\\'")}')">${f.e} ${f.n}</button>`}).join("")}</div></div>`).join("")}
</div>${sel.length>0?`<div class="meal-bar"><div style="font-size:12px;color:#666"><b style="color:#065A60">${sel.length}</b> items \u2022 <b style="color:#065A60">${tot.cal}</b> cal</div><button class="btn btn-teal" style="padding:10px 24px" onclick="mealAnalyze()">Analyze \u2192</button></div>`:""}</div>`}

function screens_leaderboard(){
return `<div class="screen active"><div class="hdr"><button onclick="go('home')">\u2190 Back</button><span>\ud83c\udfc6 Leaderboard</span></div><div class="container">
${state.lb.length===0?`<div style="text-align:center;padding:40px;color:#999"><div style="font-size:48px;margin-bottom:12px">\ud83c\udfc6</div><p style="font-size:16px;font-weight:600">No scores yet!</p><p style="font-size:14px">Play a game to get on the board.</p></div>`:state.lb.map((e,i)=>`<div class="lb-entry" style="background:${i===0?"#fef3c7":i===1?"#f1f5f9":i===2?"#fff7ed":"#fff"}"><div class="lb-rank" style="color:${i<3?"#065A60":"#94a3b8"}">${i===0?"\ud83e\udd47":i===1?"\ud83e\udd48":i===2?"\ud83e\udd49":"#"+(i+1)}</div><div style="flex:1"><div class="lb-name">${e.name}</div><div class="lb-game">${e.game}</div></div><div style="text-align:right"><div class="lb-pct" style="color:${e.pct>=80?"#16A34A":e.pct>=60?"#D97706":"#DC2626"}">${e.pct}%</div><div style="font-size:11px;color:#94a3b8">${e.score}/${e.total}</div></div></div>`).join("")}
</div></div>`}

const screens={home:screens_home,mythfact:screens_mythfact,labeldetective:screens_labeldetective,mealbuilder:screens_mealbuilder,leaderboard:screens_leaderboard};

function go(s){
if(s==="mythfact"){state.myth={qi:0,sc:0,ans:false,sel:null,str:0,best:0,shuf:shuffle(mythQ)}}
if(s==="labeldetective"){state.label={qi:0,sc:0,ans:false,sel:null,shuf:shuffle(labelQ)}}
if(s==="mealbuilder"){state.meal={sel:[],show:false}}
state.screen=s;render()
}
function mythAns(a){if(state.myth.ans)return;const q=state.myth.shuf[state.myth.qi],ok=a===q.a;state.myth.ans=true;state.myth.sel=a;if(ok){state.myth.sc++;state.myth.str++;state.myth.best=Math.max(state.myth.best,state.myth.str)}else{state.myth.str=0}render()}
function mythNext(){state.myth.qi++;state.myth.ans=false;state.myth.sel=null;render()}
function labelAns(i){if(state.label.ans)return;state.label.ans=true;state.label.sel=i;if(i===state.label.shuf[state.label.qi].correct)state.label.sc++;render()}
function labelNext(){state.label.qi++;state.label.ans=false;state.label.sel=null;render()}
function mealToggle(name){const f=foods.find(x=>x.n===name);if(!f)return;const idx=state.meal.sel.findIndex(x=>x.n===name);if(idx>=0)state.meal.sel.splice(idx,1);else state.meal.sel.push(f);state.meal.show=false;render()}
function mealAnalyze(){state.meal.show=true;render();window.scrollTo(0,0)}
function mealBack(){state.meal.show=false;render()}
function mealReset(){state.meal={sel:[],show:false};render()}
function promptLb(score,game,total){state.ps={score,game,total};state.modal=true;renderModal()}
function renderModal(){
if(!state.modal){document.getElementById("modal-root")?.remove();return}
let m=document.getElementById("modal-root");if(!m){m=document.createElement("div");m.id="modal-root";document.body.appendChild(m)}
m.innerHTML=`<div class="modal-bg" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()"><div style="font-size:36px;margin-bottom:8px">\ud83c\udfc6</div><h3 style="margin:0 0 4px;color:#065A60;font-size:18px">Add to Leaderboard?</h3><p style="color:#666;font-size:13px;margin-bottom:16px">Enter your name or nickname</p><input id="lb-name" placeholder="Your name..." maxlength="20" onkeydown="if(event.key==='Enter')submitLb()"><div class="btn-row"><button class="btn btn-teal" style="flex:1" onclick="submitLb()">Submit</button><button class="btn btn-gray" style="flex:1" onclick="closeModal()">Skip</button></div></div></div>`}
function submitLb(){const name=document.getElementById("lb-name")?.value?.trim();if(name&&state.ps){state.lb.push({name,score:state.ps.score,game:state.ps.game,total:state.ps.total,pct:Math.round(state.ps.score/state.ps.total*100)});state.lb.sort((a,b)=>b.pct-a.pct);state.lb=state.lb.slice(0,20)}closeModal()}
function closeModal(){state.modal=false;state.ps=null;document.getElementById("modal-root")?.remove()}

go("home");
</script>
</body>
</html>
